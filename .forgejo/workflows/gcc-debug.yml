name: GCC Debug

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  gcc-debug:
    runs-on: ubuntu-latest
    container: node:22-trixie

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgtest-dev \
            libbenchmark-dev \
            gcovr

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          gcovr \
            --root . \
            --exclude build/_deps \
            --exclude tests/ \
            --json-summary-pretty \
            --output build/coverage-summary.json
          PCT=$(python3 -c "import json; d=json.load(open('build/coverage-summary.json')); print(round(d['line_percent']))")
          if   [ "$PCT" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$PCT" -ge 75 ]; then COLOR="yellow"
          elif [ "$PCT" -ge 60 ]; then COLOR="orange"
          else                          COLOR="red"
          fi
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$PCT" "$COLOR" > coverage.json

      - name: Push badge to badges branch
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        run: |
          BADGE=$(cat coverage.json)
          rm -f coverage.json
          git fetch origin
          if git ls-remote --exit-code origin badges; then
            git checkout -b badges origin/badges
          else
            git checkout --orphan badges
            git rm -rf .
          fi
          echo "$BADGE" > coverage.json
          git config user.name "CI"
          git config user.email "ci@gitgud.boo"
          git add coverage.json
          git diff --cached --quiet || git commit -m "ci: update coverage badge"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@gitgud.boo/xbazzi/tradingmarketsimulator.git" badges
